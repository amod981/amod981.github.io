<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        .container{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-content: flex-start;
        }
        .section {
            background-color: black;
            border-radius: 20px;
            color: white;
            height: 300px;
            width: 50%;
            border: 10px solid rgb(56, 48, 48);
            font-size: 2rem;
            display: flex;
        }

        a.fill-div {
            display: flex;
            height: 100%;
            width: 100%;
            text-decoration: none;
            align-items: center;
            justify-content: center;
        }

        .spanBlog{
            color: green;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    {{ $path := .Get "path" }}
    {{ $path := trim $path "/" }}
    {{ $relreflink := relref . $path }}
    
    <div class="container">
        <div class="section"><a href="/myProjects/project1" class="fill-div"><span class="spanBlog">Project1</span></a></div>
        <div class="section"><a href="/myProjects/project2" class="fill-div"><span class="spanBlog">Project2</span></a></div>
        <div class="section"><a href="/myProjects/project3" class="fill-div"><span class="spanBlog">Project3</span></a></div>
        <div class="section"><a href="/myProjects/project4" class="fill-div"><span class="spanBlog">Project4</span></a></div>
    </div>
</body>
</html>
